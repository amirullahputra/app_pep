<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Peptide Master Protocol v3</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* LIGHT PALETTE — cerah, optimistis */
  --bg:#F4F6FA;--bg1:#FFFFFF;--bg2:#F0F2F8;--bg3:#E8ECF5;--bg4:#DDE3F0;
  --bdr:#D8DFF0;--bdr2:#C4CCE4;--bdr3:#A8B4D4;
  --t0:#1A2140;--t1:#3A4A6B;--t2:#6B7AA0;--t3:#9AAAC8;
  --acc:#4361EE;--acc-bg:#EEF1FD;--acc-bdr:rgba(67,97,238,.2);
  --f1:#FF6B35;--f1-bg:#FFF3EF;--f1-bdr:rgba(255,107,53,.2);
  --f2:#F59E0B;--f2-bg:#FFFBEB;--f2-bdr:rgba(245,158,11,.2);
  --f3:#10B981;--f3-bg:#ECFDF5;--f3-bdr:rgba(16,185,129,.2);
  --hor:#6366F1;--hor-bg:#EEF2FF;--hor-bdr:rgba(99,102,241,.2);
  --cns:#8B5CF6;--cns-bg:#F5F3FF;--cns-bdr:rgba(139,92,246,.2);
  --inf:#0EA5E9;--inf-bg:#F0F9FF;--inf-bdr:rgba(14,165,233,.2);
  --warn:#EF4444;--warn-bg:#FEF2F2;--warn-bdr:rgba(239,68,68,.2);
  --ok:#10B981;
  --shadow-sm:0 1px 3px rgba(26,33,64,.08),0 1px 2px rgba(26,33,64,.04);
  --shadow:0 4px 16px rgba(26,33,64,.10),0 2px 4px rgba(26,33,64,.06);
  --shadow-lg:0 8px 32px rgba(26,33,64,.12),0 4px 8px rgba(26,33,64,.08);
  --r:8px;--r2:12px;--r3:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t0);font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:13px;line-height:1.5;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

/* ── LAYOUT ── */
.app{max-width:1320px;margin:0 auto;padding:1.75rem 1.5rem 5rem}

/* ── TOP BAR ── */
.topbar{background:var(--bg1);border-bottom:1px solid var(--bdr);margin:-1.75rem -1.5rem 1.5rem;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:var(--shadow-sm);position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-ico{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:800;color:var(--t0);letter-spacing:-.3px}
.topbar-sub{font-size:10px;color:var(--t2);margin-top:1px}
.topbar-badges{display:flex;gap:5px;flex-wrap:wrap}
.bdg{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;letter-spacing:.2px}
.bdg-acc{background:var(--acc-bg);color:var(--acc);border:1px solid var(--acc-bdr)}
.bdg-f1{background:var(--f1-bg);color:var(--f1);border:1px solid var(--f1-bdr)}
.bdg-f2{background:var(--f2-bg);color:var(--f2);border:1px solid var(--f2-bdr)}
.bdg-f3{background:var(--f3-bg);color:var(--f3);border:1px solid var(--f3-bdr)}
.bdg-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn-bdr)}
.dl-btn{background:var(--acc);color:#fff;border:none;padding:8px 16px;border-radius:var(--r);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;box-shadow:0 2px 8px rgba(67,97,238,.3)}
.dl-btn:hover{background:#3451d1;transform:translateY(-1px)}

/* ── METRIC CARDS ── */
.metric-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:1.25rem}
.mc{background:var(--bg1);border:2px solid var(--bdr);border-radius:var(--r2);padding:1rem;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.mc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 10px 10px;background:transparent;transition:background .2s}
.mc:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--bdr2)}
.mc.act{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-bg),var(--shadow)}
.mc.act::after{background:var(--acc)}
.mc.mc-grand{background:linear-gradient(135deg,#4361EE 0%,#7C3AED 100%);border-color:transparent;color:#fff}
.mc.mc-grand .mc-l{color:rgba(255,255,255,.7)}
.mc.mc-grand .mc-v{color:#fff}
.mc.mc-grand .mc-s{color:rgba(255,255,255,.6)}
.mc.mc-grand::after{background:rgba(255,255,255,.3)}
.mc.mc-f1{border-color:var(--f1-bdr)}
.mc.mc-f1.act{border-color:var(--f1);box-shadow:0 0 0 3px var(--f1-bg),var(--shadow)}
.mc.mc-f1::after{background:transparent}.mc.mc-f1.act::after{background:var(--f1)}
.mc.mc-f2{border-color:var(--f2-bdr)}
.mc.mc-f2.act{border-color:var(--f2);box-shadow:0 0 0 3px var(--f2-bg),var(--shadow)}
.mc.mc-f2::after{background:transparent}.mc.mc-f2.act::after{background:var(--f2)}
.mc.mc-f3{border-color:var(--f3-bdr)}
.mc.mc-f3.act{border-color:var(--f3);box-shadow:0 0 0 3px var(--f3-bg),var(--shadow)}
.mc.mc-f3::after{background:transparent}.mc.mc-f3.act::after{background:var(--f3)}
.mc-l{font-size:9.5px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.mc-v{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--t0);line-height:1;margin-bottom:4px}
.mc-v.sm{font-size:15px}
.mc-s{font-size:10px;color:var(--t2);line-height:1.4}
.mc-pill{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:5px}
.mc-arrow{position:absolute;top:10px;right:10px;font-size:11px;color:var(--t3);transition:all .2s}
.mc:hover .mc-arrow,.mc.act .mc-arrow{color:var(--acc);transform:translateX(2px)}

/* ── PHASE CARDS ── */
.phase-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.ph-card{background:var(--bg1);border:2px solid var(--bdr);border-radius:var(--r2);padding:1rem 1.125rem;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-sm)}
.ph-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.ph-card.sel-f1{border-color:var(--f1);background:var(--f1-bg);box-shadow:0 0 0 3px rgba(255,107,53,.12),var(--shadow)}
.ph-card.sel-f2{border-color:var(--f2);background:var(--f2-bg);box-shadow:0 0 0 3px rgba(245,158,11,.12),var(--shadow)}
.ph-card.sel-f3{border-color:var(--f3);background:var(--f3-bg);box-shadow:0 0 0 3px rgba(16,185,129,.12),var(--shadow)}
.ph-tag{font-size:9.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ph-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ph-name{font-size:14px;font-weight:800;color:var(--t0);margin-bottom:2px}
.ph-desc{font-size:11px;color:var(--t2);margin-bottom:10px}
.ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ph-stat{background:rgba(255,255,255,.6);border-radius:var(--r);padding:.5rem;border:1px solid rgba(0,0,0,.04)}
.ph-stat-l{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.ph-stat-v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--t0)}
.ph-bar{height:4px;border-radius:2px;background:var(--bg3);margin-top:10px;overflow:hidden}
.ph-bar-fill{height:100%;border-radius:2px}

/* ── TAB NAV ── */
.tab-nav{display:flex;gap:4px;background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:4px;margin-bottom:1.25rem;overflow-x:auto;box-shadow:var(--shadow-sm)}
.tab-btn{flex:1;min-width:max-content;padding:8px 14px;font-size:11.5px;font-weight:700;cursor:pointer;border:1px solid transparent;border-radius:var(--r);color:var(--t2);background:transparent;text-align:center;transition:all .15s;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px}
.tab-btn:hover:not(.act){color:var(--t1);background:var(--bg2)}
.tab-btn.act{color:#fff;background:var(--acc);border-color:var(--acc);box-shadow:0 2px 8px rgba(67,97,238,.3)}

/* ── PANEL ── */
.panel{display:none}.panel.act{display:block}

/* ── CARD ── */
.card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:1rem 1.125rem;box-shadow:var(--shadow-sm)}
.card-title{font-size:10.5px;font-weight:800;color:var(--t1);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.875rem;display:flex;align-items:center;gap:6px}
.card-title .ico{font-size:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* ── LAYER BADGE ── */
.lb{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
.l-off{background:var(--f1-bg);color:var(--f1);border:1px solid var(--f1-bdr)}
.l-met{background:var(--f2-bg);color:var(--f2);border:1px solid var(--f2-bdr)}
.l-def{background:var(--f3-bg);color:var(--f3);border:1px solid var(--f3-bdr)}
.l-hor{background:var(--hor-bg);color:var(--hor);border:1px solid var(--hor-bdr)}
.l-cns{background:var(--cns-bg);color:var(--cns);border:1px solid var(--cns-bdr)}
.l-inf{background:var(--inf-bg);color:var(--inf);border:1px solid var(--inf-bdr)}

/* ── SCORE PILLS ── */
.spill{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;min-width:32px;text-align:center}
.sp-h{background:#DCFCE7;color:#15803D}
.sp-m{background:#FEF9C3;color:#92400E}
.sp-l{background:#FEE2E2;color:#B91C1C}
.sp-o{background:var(--bg3);color:var(--t3)}
.status-pill{font-size:9px;font-weight:800;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.st-wajib{background:#DCFCE7;color:#15803D}
.st-opsional{background:#FEF9C3;color:#92400E}
.st-rendah{background:#FEE2E2;color:#B91C1C}
.st-off{background:var(--bg3);color:var(--t3)}

/* ── SROW ── */
.srow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.srow-lbl{font-size:11px;font-weight:500;color:var(--t1);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow-bar{flex:1;height:18px;background:var(--bg3);border-radius:4px;overflow:hidden}
.srow-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;transition:width .5s ease}
.srow-txt{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:rgba(255,255,255,.9);font-weight:600}
.srow-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;min-width:34px;text-align:right;color:var(--t1)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border:1px solid var(--bdr);border-radius:var(--r2)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:8px 10px;font-size:9.5px;font-weight:800;color:var(--t2);background:var(--bg2);border-bottom:1px solid var(--bdr2);white-space:nowrap;text-align:left;text-transform:uppercase;letter-spacing:.4px}
th.r,td.r{text-align:right}th.c,td.c{text-align:center}
tbody td{padding:8px 10px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg2)}
.tbl-foot td{background:var(--bg2);border-top:2px solid var(--bdr2);font-weight:700}
.cost-v{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--acc)}
.zero{color:var(--t3)}

/* ── VIAL CARDS ── */
.vial-filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:.75rem 1rem;box-shadow:var(--shadow-sm)}
.vf-lbl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;margin-right:4px}
.vf-btn{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--bdr2);background:var(--bg2);color:var(--t2);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.vf-btn:hover{border-color:var(--acc);color:var(--acc)}
.vf-btn.act{background:var(--acc);color:#fff;border-color:var(--acc);box-shadow:0 2px 6px rgba(67,97,238,.25)}
.vf-sep{width:1px;height:20px;background:var(--bdr2);margin:0 4px}
.vial-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.vcard{background:var(--bg1);border:2px solid var(--bdr);border-radius:var(--r2);overflow:hidden;transition:all .2s;box-shadow:var(--shadow-sm)}
.vcard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--bdr2)}
.vcard-hdr{padding:.75rem 1rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.vcard-name{font-size:13px;font-weight:800;color:var(--t0)}
.vcard-price{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--t2)}
.vcard-price strong{color:var(--acc);font-size:13px}
.vcard-body{padding:.75rem 1rem}
.vcard-spec{display:flex;align-items:center;gap:6px;margin-bottom:.75rem;flex-wrap:wrap}
.spec-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--bg2);color:var(--t1);border:1px solid var(--bdr)}
.vcard-phase-row{display:flex;gap:6px;margin-bottom:.625rem}
.vph{flex:1;border-radius:var(--r);padding:.5rem;text-align:center;border:1px solid transparent}
.vph.has{border-color:var(--bdr2);background:var(--bg2)}
.vph.none{opacity:.35;background:var(--bg3)}
.vph-name{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.vph-v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
.vph-sub{font-size:8.5px;color:var(--t2);margin-top:1px}
.vcard-totbar{margin-top:.625rem}
.vcard-totbar-lbl{display:flex;justify-content:space-between;margin-bottom:3px}
.vcard-totbar-lbl span{font-size:10px;color:var(--t2)}
.vcard-totbar-lbl strong{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--t0)}
.vbar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.vbar-fill{height:100%;border-radius:3px}
.eff-badge{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:5px}
.eff-hi{background:#DCFCE7;color:#15803D}
.eff-mid{background:#FEF9C3;color:#92400E}
.eff-lo{background:#FEE2E2;color:#B91C1C}

/* ── VIAL SUMMARY ── */
.vial-summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.vs-card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:.875rem 1rem;box-shadow:var(--shadow-sm)}
.vs-l{font-size:9.5px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.vs-v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--t0);line-height:1}
.vs-s{font-size:10px;color:var(--t2);margin-top:3px}

/* ── GANTT ── */
.gantt-wrap{overflow-x:auto}
.gantt-grid{min-width:860px}
.gantt-ph-row{display:flex;margin-left:152px;gap:1px;margin-bottom:5px}
.gantt-ph-seg{border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;letter-spacing:.4px;height:18px}
.gantt-wk-row{display:flex;margin-left:152px;gap:1px;margin-bottom:6px}
.gantt-wk{flex:1;font-size:7.5px;color:var(--t3);text-align:center}
.g-row{display:flex;align-items:center;gap:1px;margin-bottom:2px}
.g-lbl{width:152px;font-size:10.5px;font-weight:600;color:var(--t1);flex-shrink:0;padding-right:8px;display:flex;align-items:center;gap:4px;overflow:hidden}
.g-cells{display:flex;gap:1px;flex:1}
.g-cell{flex:1;height:18px;border-radius:2px;min-width:0;cursor:default;position:relative}
.g-cell:hover .g-tip{display:block}
.g-tip{display:none;position:absolute;bottom:calc(100%+4px);left:50%;transform:translateX(-50%);background:var(--t0);color:#fff;font-size:9.5px;padding:3px 7px;border-radius:4px;white-space:nowrap;z-index:50;pointer-events:none}
.g-off{background:var(--bg3)}
.g-1{background:rgba(255,107,53,.35)}
.g-2{background:rgba(245,158,11,.35)}
.g-3{background:rgba(16,185,129,.35)}
.g-1.w{background:var(--f1)}
.g-2.w{background:var(--f2)}
.g-3.w{background:var(--f3)}

/* ── BUDGET ── */
.bud-controls{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--r2);padding:1rem;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.bud-val-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.bud-val{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--acc);line-height:1}
.bud-lbl{font-size:11px;color:var(--t2)}
input[type=range]{width:100%;accent-color:var(--acc);cursor:pointer;height:4px}
.ph-toggle-row{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;align-items:center}
.ph-tgl{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--bdr2);background:var(--bg2);color:var(--t2);cursor:pointer;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif}
.ph-tgl.tf1{background:var(--f1-bg);color:var(--f1);border-color:var(--f1)}
.ph-tgl.tf2{background:var(--f2-bg);color:var(--f2);border-color:var(--f2)}
.ph-tgl.tf3{background:var(--f3-bg);color:var(--f3);border-color:var(--f3)}
.auto-btn{margin-left:auto;background:var(--acc);color:#fff;border:none;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;box-shadow:0 2px 6px rgba(67,97,238,.25)}
.bud-progress{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r2);padding:.875rem 1rem;margin-bottom:12px}
.bud-prog-bar{height:12px;border-radius:6px;background:var(--bg3);overflow:hidden;margin:8px 0 4px}
.bud-prog-fill{height:100%;border-radius:6px;transition:width .3s,background .3s}

/* CONFLICT BANNER */
.conflict-banner{padding:.875rem 1rem;border-radius:var(--r2);margin-bottom:12px;display:flex;align-items:flex-start;gap:10px;border:1.5px solid transparent}
.cb-ok{background:var(--f3-bg);border-color:var(--f3-bdr)}
.cb-warn{background:var(--warn-bg);border-color:var(--warn-bdr)}
.cb-ico{font-size:20px;flex-shrink:0}
.cb-title{font-size:12px;font-weight:800;margin-bottom:3px}
.cb-ok .cb-title{color:var(--f3)}.cb-warn .cb-title{color:var(--warn)}
.cb-list{font-size:11px;color:var(--t1)}

/* BOPT ROW */
.bopt-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr)}
.bopt-row:last-child{border-bottom:none}

  search:'',
};

function initBudSel(ph){
  S.budSel=new Set();
  COMPOUNDS.forEach(c=>{if((c.c[`f${ph}`]?.cost||0)>0)S.budSel.add(c.name);});
}

// UTILS
// ══════════════════════════════════════════════════════════
const rp=n=>'Rp '+Math.round(n).toLocaleString('id-ID');
const rpM=n=>n>=1e6?'Rp '+(n/1e6).toFixed(n%1e6===0?0:1)+' jt':rp(n);
const pCost=ph=>COMPOUNDS.reduce((a,c)=>a+(c.c[`f${ph}`]?.cost||0),0);
const totCost=c=>c.c.tot.cost;
const totVials=c=>c.c.tot.v||0;

function scCol(s){return s>=60?'#15803D':s>=35?'#92400E':s>=15?'#B91C1C':'var(--t3)'}
function scSpill(s){return s>=60?'sp-h':s>=35?'sp-m':s>=15?'sp-l':'sp-o'}
function stLabel(s){
  if(s>=60)return{cls:'st-wajib',l:'WAJIB'};
  if(s>=35)return{cls:'st-opsional',l:'OPSIONAL'};
  if(s>=15)return{cls:'st-rendah',l:'RENDAH'};
  return{cls:'st-off',l:'OFF'};
}
function phOfW(w){return w<=28?1:w<=44?2:3}
function getPrio(name,ph){return SC[name]?.[`f${ph}`]?.p||0}
function budEff(name,ph){
  const p=getPrio(name,ph),c=COMPOUNDS.find(x=>x.name===name)?.c[`f${ph}`]?.cost||0;
  return(!c||!p)?0:Math.round(p/(c/1e6));
}
function sportScore(name){
  const s=SP[name];if(!s)return 0;
  return Math.round((s.z2*.3+s.pw*.2+s.rc*.2+s.hr*.15+s.cn*.15)*20);
}
function getConflicts(){
  return REDUNDANCY.map(r=>({...r,active:r.cmps.filter(c=>S.budSel.has(c)),triggered:r.cmps.filter(c=>S.budSel.has(c)).length>=r.thresh}));
}

const METRIC_DEFS=[
  {id:'grand',cls:'mc-grand',label:'Grand Total',tab:0,suffix:'',sub:'56 minggu · 26 cpd'},
  {id:'f1',cls:'mc-f1',label:'Fase 1 W1–28',tab:0,ph:1,sub:'Offensive dominant'},
  {id:'f2',cls:'mc-f2',label:'Fase 2 W29–44',tab:0,ph:2,sub:'Transisi kritis'},
  {id:'f3',cls:'mc-f3',label:'Fase 3 W45–56',tab:0,ph:3,sub:'Precision defense'},
  {id:'vials',cls:'',label:'Total Vials',tab:2,sub:'Klik → detail vial'},
  {id:'wajib',cls:'',label:'Wajib F1',tab:1,sub:'Priority ≥60'},
  {id:'cpds',cls:'',label:'Compounds',tab:4,sub:'Klik → sport profile'},
];

function renderMetricStrip(){
  const grand=COMPOUNDS.reduce((a,c)=>a+totCost(c),0);
  const totalV=COMPOUNDS.reduce((a,c)=>a+totVials(c),0);
  const wajib1=COMPOUNDS.filter(c=>getPrio(c.name,1)>=60).length;
  const vals={grand:rpM(grand),f1:rpM(pCost(1)),f2:rpM(pCost(2)),f3:rpM(pCost(3)),vials:totalV,wajib:wajib1,cpds:COMPOUNDS.length};

  document.getElementById('metric-strip').innerHTML=METRIC_DEFS.map((m,i)=>{
    const v=vals[m.id];
    const isAct=(m.ph&&S.ph===m.ph)||(m.tab===S.tab&&!m.ph);
    const _pbg=m.ph===1?'rgba(255,107,53,.15)':m.ph===2?'rgba(245,158,11,.15)':'rgba(16,185,129,.15)';
    const _pc=m.ph===1?'var(--f1)':m.ph===2?'var(--f2)':'var(--f3)';
    const _pt=m.ph===1?'↑ aggressive':m.ph===2?'↔ balanced':'↓ precise';
    const pill=m.ph?'<div class="mc-pill" style="background:'+_pbg+';color:'+_pc+'">'+_pt+'</div>':'';
    return `<div class="mc ${m.cls}${isAct?' act':''}" onclick="onMcClick(${i})" title="Klik untuk detail">
      <div class="mc-l">${m.label}</div>
      <div class="mc-v${typeof v==='string'&&v.length>8?' sm':''}">${v}</div>
      <div class="mc-s">${m.sub}</div>
      ${pill}
      <span class="mc-arrow">→</span>
    </div>`;
  }).join('');
}

function onMcClick(i){
  const m=METRIC_DEFS[i];
  if(m.ph){S.ph=m.ph;renderPhaseRow();}
  S.tab=m.tab;
  if(m.id==='vials')S.tab=2;
  renderNav();renderPanels();renderMetricStrip();
}

function renderPhaseRow(){
  const max=Math.max(...PHASES.map(p=>pCost(p.id)));
  document.getElementById('phase-row').innerHTML=PHASES.map(p=>{
    const c=pCost(p.id),pct=Math.round(c/max*100),sel=S.ph===p.id;
    const acv=COMPOUNDS.filter(cx=>(cx.c[`f${p.id}`]?.cost||0)>0).length;
    const tv=COMPOUNDS.reduce((a,cx)=>a+(cx.c[`f${p.id}`]?.v||0),0);
    return `<div class="ph-card${sel?' '+p.selCls:''}" onclick="setPhase(${p.id})">
      <div class="ph-tag" style="color:${p.col}">
        <div class="ph-dot" style="background:${p.col}"></div>
        ${p.cls.toUpperCase()} · ${p.bf}
      </div>
      <div class="ph-name">${p.name} — ${p.label}</div>
      <div class="ph-desc">${p.desc}</div>
      <div class="ph-grid">
        <div class="ph-stat"><div class="ph-stat-l">Minggu</div><div class="ph-stat-v">${p.wk}</div></div>
        <div class="ph-stat"><div class="ph-stat-l">Biaya</div><div class="ph-stat-v" style="color:${p.col}">${rpM(c)}</div></div>

  const wkRow=`<div class="gantt-wk-row">${weeks.map(w=>`<div class="gantt-wk">${w%4===0?'W'+w:''}</div>`).join('')}</div>`;

  </div>`;
}

// P4 — BUDGET + CONFLICT
// ──────────────────────────────────────────
function pBudget(){
  const ph=S.budPh,phKey=`f${ph}`;
  const cap=S.budCap;
  const phCol={1:'var(--f1)',2:'var(--f2)',3:'var(--f3)'};

  const sorted=[...COMPOUNDS]
    .map(c=>({...c,prio:getPrio(c.name,ph),cost:c.c[phKey]?.cost||0,eff:budEff(c.name,ph),ss:sportScore(c.name)}))
    .filter(c=>c.cost>0).sort((a,b)=>b.prio-a.prio);

  const selCost=sorted.filter(c=>S.budSel.has(c.name)).reduce((a,c)=>a+c.cost,0);
  const selPct=Math.min(100,Math.round(selCost/cap*100));
  const over=selCost>cap;
  let sugCost=0,suggested=[];
  sorted.forEach(c=>{if(sugCost+c.cost<=cap){sugCost+=c.cost;suggested.push(c.name);}});

  const conflicts=getConflicts(),actConf=conflicts.filter(r=>r.triggered);

  const cBanner=actConf.length>0
    ?`<div class="conflict-banner cb-warn"><div class="cb-ico">⚠️</div><div><div class="cb-title">${actConf.length} KONFLIK AKTIF dalam seleksi lo!</div><div class="cb-list">${actConf.map(r=>`• ${r.lvl} — ${r.title}`).join('<br>')}</div><div style="font-size:10px;color:var(--t2);margin-top:4px">Scroll ke Live Monitor →</div></div></div>`
    :`<div class="conflict-banner cb-ok"><div class="cb-ico">✅</div><div><div class="cb-title">Tidak ada konflik terdeteksi</div><div style="font-size:11px;color:var(--t1)">Seleksi ${S.budSel.size} compounds saat ini aman dari conflict rules.</div></div></div>`;

  const cmpRows=sorted.map(c=>{
    const sel=S.budSel.has(c.name),conf=actConf.some(r=>r.active.includes(c.name));
    return`<div class="bopt-row${conf?' in-conflict':''}">
      <div class="chk${sel?' on':''}" onclick="toggleBudSel('${c.name}')"></div>
      <div class="bopt-info">
        <div class="bopt-name" style="${conf?'color:var(--warn)':''}">${c.name}${conf?' ⚠':''}</div>
        <div class="bopt-sub">
          <span class="lb ${CAT[c.cat].cls}" style="font-size:8.5px">${CAT[c.cat].n}</span>
          <span>Prio <strong>${c.prio}</strong></span>
          <span>★${c.ss}</span>
          <span>Eff <strong style="color:${c.eff>=10?'var(--f3)':c.eff>=5?'var(--f2)':'var(--t3)'}">${c.eff>0?c.eff+'x':'—'}</strong></span>
        </div>
      </div>
      <div class="bopt-cost">${rpM(c.cost)}</div>
    </div>`;
  }).join('');

  const redAlerts=conflicts.map(r=>{
    const cls=r.triggered?`la-${r.lvl.toLowerCase()}`:'la-ok';
    return`<div class="live-alert ${cls}">
      <div class="la-title">${r.triggered?'⚠':'✓'} ${r.lvl} — ${r.title}</div>
      ${r.triggered?`<div class="la-body">${r.body}</div><div class="la-rec">→ ${r.rec}</div>`:''}
      <div class="la-cmps">${r.cmps.map(c=>`<span class="la-cmp${r.active.includes(c)?' hit':''}">${c}</span>`).join('')}</div>
    </div>`;
  }).join('');

  const effRanking=[...sorted].sort((a,b)=>b.eff-a.eff).slice(0,8);

  return`
  <div class="bud-controls">
    <div class="bud-val-row"><div class="bud-val" id="budDisp">${rpM(cap)}</div><div class="bud-lbl">budget cap</div></div>
    <input type="range" min="5000000" max="200000000" step="5000000" value="${cap}"
      oninput="S.budCap=+this.value;document.getElementById('budDisp').textContent='Rp '+Math.round(+this.value).toLocaleString('id-ID');renderPanels()">
    <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-top:3px">
      <span>Rp 5 jt</span><span>Rp 200 jt</span>
    </div>
    <div class="ph-toggle-row">
      <span style="font-size:10px;color:var(--t2);font-weight:700">Fase:</span>
      ${PHASES.map(p=>`<button class="ph-tgl${S.budPh===p.id?' t'+p.cls:''}" onclick="S.budPh=${p.id};initBudSel(${p.id});renderPanels()">${p.name}</button>`).join('')}
      <button class="auto-btn" onclick="S.budSel=new Set(${JSON.stringify(suggested)});renderPanels()">✨ Auto Pilih Optimal</button>
    </div>
  </div>

  <div class="bud-progress">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:12px;font-weight:700;color:var(--t1)">Dipilih: <span style="color:${phCol[ph]}">${rpM(selCost)}</span> · ${S.budSel.size} compounds</span>
      <span style="font-size:12px;font-weight:700;color:var(--t1)">Sisa: <span style="color:${over?'var(--warn)':'var(--f3)'}">${over?'OVER BUDGET':rpM(cap-selCost)}</span></span>
    </div>
    <div class="bud-prog-bar"><div class="bud-prog-fill" style="width:${selPct}%;background:${over?'var(--warn)':phCol[ph]}"></div></div>
    <div style="font-size:10px;color:var(--t2);margin-top:3px">${selPct}% dari cap · Fase ${ph}</div>
  </div>

  ${cBanner}

  <div class="grid2">
    <div class="card">
      <div class="card-title"><span class="ico">💰</span> Pilih Compound — Fase ${ph}</div>
      ${cmpRows}
      <div class="note">Centang untuk include. Conflict langsung terdeteksi real-time. Auto Pilih = greedy by Priority Score sampai budget habis.</div>
    </div>
    <div>
      <div class="card" style="margin-bottom:10px">
        <div class="card-title">
          <span class="live-dot" style="background:${actConf.length>0?'var(--warn)':'var(--f3)'}"></span>
          Live Conflict Monitor — ${actConf.length}/${REDUNDANCY.length} aktif
        </div>
        ${redAlerts}
      </div>
      <div class="card">
        <div class="card-title"><span class="ico">⚡</span> Top Budget Efficiency — Fase ${ph}</div>
        ${effRanking.map(c=>{const sel=S.budSel.has(c.name);return`<div class="srow" style="${sel?'':'opacity:.4'}">
          <div class="srow-lbl">${c.name}</div>
          <div class="srow-bar"><div class="srow-fill" style="width:${Math.min(100,c.eff*5)}%;background:${c.eff>=10?'var(--f3)':c.eff>=5?'var(--f2)':'var(--f1)'}"><span class="srow-txt">${c.eff}x</span></div></div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--acc)">${rpM(c.cost)}</div>
        </div>`;}).join('')}
        <div class="note">Efisiensi = Priority Score ÷ Biaya (juta Rp). Dim = belum dipilih.</div>
      </div>
    </div>
  </div>`;
}
function toggleBudSel(n){S.budSel.has(n)?S.budSel.delete(n):S.budSel.add(n);renderPanels();}

// ──────────────────────────────────────────
// P5 — COMPOUNDS
// ──────────────────────────────────────────
function pCompounds(){
  const ph=S.ph;
  const allDims={z2:0,pw:0,rc:0,hr:0,cn:0};
  COMPOUNDS.forEach(c=>{const s=SP[c.name];if(s)Object.keys(allDims).forEach(k=>allDims[k]+=s[k])});
  const maxD=Math.max(...Object.values(allDims));

  const sportSummary=`<div class="card" style="margin-bottom:12px">
    <div class="card-title"><span class="ico">🏋️</span> Sport Profile Architecture — Hybrid Power-Based Athlete</div>
    <div class="sport-grid">
      ${[['z2','🚴','Zone 2','Endurance synergy'],['pw','⚡','Power','Output support'],['rc','🔄','Recovery','Rate accel'],['hr','🧬','Hormonal','Axis protection'],['cn','🧠','CNS','Clarity deficit']].map(([k,ico,n,sub])=>{
        const v=allDims[k],pct=Math.round(v/maxD*100);
        const top=[...COMPOUNDS].sort((a,b)=>(SP[b.name]?.[k]||0)-(SP[a.name]?.[k]||0)).slice(0,3).map(c=>c.name);
        return`<div class="sp-card">
          <div class="sp-ico">${ico}</div>
          <div class="sp-name">${n}</div>
          <div class="sp-sub">${sub}</div>
          <div class="sp-val">${v}</div>
          <div class="sp-bar"><div class="sp-bar-fill" style="width:${pct}%"></div></div>
          <div class="sp-top">${top.join(' · ')}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="note">Score = sum semua compound di protokol. Critical path lo: Zone 2 + Power = SS-31, MOTS-c, SLU-PP-332, CJC-1295+IPA, IGF-1 LR3.</div>
  </div>`;

  const filtered=[...COMPOUNDS]
    .filter(c=>S.filterCats.has(c.cat)&&(!S.search||c.name.toLowerCase().includes(S.search.toLowerCase())))
    .sort((a,b)=>sportScore(b.name)-sportScore(a.name));

  const filterBar=`<div class="filter-bar">
    <span class="fl">Layer:</span>
    ${Object.entries(CAT).map(([k,v])=>`
    <div class="fp${S.filterCats.has(k)?' act':''}" onclick="toggleCat('${k}')">
      <div class="dot" style="background:${v.col}"></div>${v.n}
    </div>`).join('')}
    <input class="srch" placeholder="Cari compound..." value="${S.search}" oninput="S.search=this.value;renderPanels()">
  </div>`;

  const cards=filtered.map(c=>{
    const sc=SC[c.name]||{},sp=SP[c.name]||{z2:0,pw:0,rc:0,hr:0,cn:0,risk:''};
    const f1=sc.f1||{r:0,p:0},f2=sc.f2||{r:0,p:0},f3=sc.f3||{r:0,p:0};
    const ss=sportScore(c.name),eff=budEff(c.name,ph),cost=c.c[`f${ph}`]?.cost||0;
    const pips=(v)=>Array.from({length:5},(_,i)=>`<div class="pip ${i<v?'pip-on':'pip-off'}"></div>`).join('');
    return`<div class="cmp-card">
      <div class="cmp-hdr">
        <div><span class="lb ${CAT[c.cat].cls}">${CAT[c.cat].n}</span><div class="cmp-name">${c.name}</div></div>
        <div style="text-align:right">
          <div style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800;color:var(--acc)">★${ss}</div>
          <div style="font-size:9px;color:var(--t2)">sport</div>
        </div>
      </div>
      <div class="cmp-body">
        <div class="cmp-scores">
          ${[1,2,3].map(p=>{const s=(p===1?f1:p===2?f2:f3);return`<div class="cmp-sc"><div class="cmp-sc-lbl">Prio F${p}</div><div class="cmp-sc-v" style="color:${scCol(s.p)}">${s.p}</div></div>`;}).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t2);margin-bottom:.5rem">
          <span>F${ph}: <strong style="font-family:'JetBrains Mono',monospace;color:var(--acc)">${cost>0?rpM(cost):'—'}</strong></span>
          <span>Eff: <strong style="color:${eff>=10?'var(--f3)':eff>=5?'var(--f2)':'var(--t3)'}">${eff>0?eff+'x':'—'}</strong></span>
          <span>Harga/vial: <strong style="font-family:'JetBrains Mono',monospace">${rp(VSPECS[c.name]?.vPrice||0)}</strong></span>
        </div>
        ${[['z2','🚴 Zone 2'],['pw','⚡ Power'],['rc','🔄 Recovery'],['hr','🧬 Hormonal'],['cn','🧠 CNS']].map(([k,lbl])=>`
        <div class="cmp-sport-row">
          <div class="cmp-sl">${lbl}</div>
          <div class="pips">${pips(sp[k])}</div>
          <span style="font-size:9px;color:var(--t2);margin-left:5px">${sp[k]}/5</span>
        </div>`).join('')}
        <div class="cmp-mech">${MECHS[c.name]||''}</div>
        ${sp.risk?`<div style="margin-top:.5rem"><span class="tag tag-warn">⚠ ${sp.risk}</span></div>`:''}
      </div>
    </div>`;
  }).join('');

  return`${sportSummary}${filterBar}<div class="cmp-grid">${cards}</div>`;
}

function toggleCat(k){
  if(S.filterCats.has(k)){if(S.filterCats.size>1)S.filterCats.delete(k);}
  else S.filterCats.add(k);
  renderPanels();
}

  const a=document.createElement('a');
  a.download='peptide_master_v3.html';
  a.href='data:text/html;charset=utf-8,'+encodeURIComponent(document.documentElement.outerHTML);
  a.click();
}

renderMetricStrip();
renderPhaseRow();
renderNav();
renderPanels();
</script>
